<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投資資產紀錄 APP</title>
    <!-- 使用 React 17 以獲得最佳的 CDN 庫兼容性 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 增加 prop-types 這是 Recharts 在某些版本需要的依賴 -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.1.12/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .modal-enter { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        // 確保所有資源加載完成
        const startApp = () => {
            const { useState, useEffect, useMemo } = React;
            const { 
                PieChart, Pie, Cell, ResponsiveContainer, Tooltip, Legend
            } = Recharts;
            const { 
                Plus, Wallet, History, TrendingUp, PieChart: PieIcon, 
                Trash2, ArrowUpRight, ArrowDownRight, Landmark 
            } = lucide;

            const ASSET_TYPES = [
                { id: 'saving', name: '活期現金', color: '#3b82f6' },
                { id: 'stock_cash', name: '證券現金', color: '#60a5fa' },
                { id: 'stock_cost', name: '證券成本', color: '#10b981' },
                { id: 'stock_unrealized', name: '證券未實現', color: '#f59e0b' },
                { id: 'stock_realized', name: '證券已實現', color: '#ef4444' },
                { id: 'liability', name: '投資負債', color: '#6366f1', isDebt: true }
            ];

            function App() {
                const [banks, setBanks] = useState(() => {
                    const saved = localStorage.getItem('my_invest_banks_v3');
                    return saved ? JSON.parse(saved) : [];
                });
                const [history, setHistory] = useState(() => {
                    const saved = localStorage.getItem('my_invest_history_v3');
                    return saved ? JSON.parse(saved) : [];
                });

                const [activeTab, setActiveTab] = useState('overview');
                const [showAddBank, setShowAddBank] = useState(false);
                const [newBankName, setNewBankName] = useState('');
                const [editingAsset, setEditingAsset] = useState(null);
                const [transactionAmount, setTransactionAmount] = useState('');
                const [transactionNote, setTransactionNote] = useState('');

                useEffect(() => {
                    localStorage.setItem('my_invest_banks_v3', JSON.stringify(banks));
                    lucide.createIcons();
                }, [banks, activeTab, showAddBank, editingAsset]);

                useEffect(() => {
                    localStorage.setItem('my_invest_history_v3', JSON.stringify(history));
                }, [history]);

                const addBank = () => {
                    if (!newBankName.trim()) return;
                    const newBank = {
                        id: Date.now().toString(),
                        name: newBankName,
                        assets: ASSET_TYPES.reduce((acc, type) => ({ ...acc, [type.id]: 0 }), {})
                    };
                    setBanks([...banks, newBank]);
                    setNewBankName('');
                    setShowAddBank(false);
                };

                const deleteBank = (id) => {
                    if (window.confirm('確定要刪除此帳戶嗎？')) {
                        setBanks(banks.filter(b => b.id !== id));
                        setHistory(history.filter(h => h.bankId !== id));
                    }
                };

                const handleTransaction = (type) => {
                    const amount = parseFloat(transactionAmount);
                    if (isNaN(amount) || amount <= 0) return;
                    const finalAmount = type === 'plus' ? amount : -amount;

                    setBanks(banks.map(b => b.id === editingAsset.bankId ? {
                        ...b, assets: { ...b.assets, [editingAsset.assetId]: (b.assets[editingAsset.assetId] || 0) + finalAmount }
                    } : b));

                    setHistory([{
                        id: Date.now().toString(),
                        timestamp: new Date().toISOString(),
                        bankId: editingAsset.bankId,
                        bankName: banks.find(b => b.id === editingAsset.bankId).name,
                        assetName: editingAsset.assetName,
                        amount: finalAmount,
                        note: transactionNote || (type === 'plus' ? '存入' : '支出')
                    }, ...history]);

                    setEditingAsset(null);
                    setTransactionAmount('');
                    setTransactionNote('');
                };

                const pieData = useMemo(() => ASSET_TYPES.map(t => ({
                    name: t.name, value: Math.abs(banks.reduce((acc, b) => acc + (b.assets[t.id] || 0), 0)), color: t.color
                })).filter(d => d.value > 0), [banks]);

                const totalAssets = banks.reduce((acc, b) => acc + Object.values(b.assets).reduce((a, v) => a + v, 0), 0);

                return (
                    <div className="min-h-screen pb-24">
                        <header className="bg-white border-b p-4 sticky top-0 z-10 shadow-sm">
                            <div className="max-w-xl mx-auto flex justify-between items-center">
                                <h1 className="text-xl font-bold text-indigo-600 flex items-center gap-2">
                                    <i data-lucide="trending-up" className="w-6 h-6"></i> 投資紀錄 APP
                                </h1>
                                <button onClick={() => setShowAddBank(true)} className="bg-indigo-600 text-white p-2 rounded-full shadow-md active:scale-90 transition">
                                    <i data-lucide="plus" className="w-5 h-5"></i>
                                </button>
                            </div>
                        </header>

                        <main className="max-w-xl mx-auto p-4 space-y-6">
                            {activeTab === 'overview' && (
                                <div className="space-y-6">
                                    <div className="bg-gradient-to-br from-indigo-600 to-indigo-700 p-8 rounded-3xl text-white shadow-xl">
                                        <p className="opacity-70 text-sm font-medium mb-1">總淨資產</p>
                                        <h2 className="text-4xl font-bold font-mono">${totalAssets.toLocaleString()}</h2>
                                    </div>
                                    <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                                        <h3 className="font-bold mb-4 flex items-center gap-2 text-slate-700">
                                            <i data-lucide="pie-chart" className="w-4 h-4 text-indigo-500"></i> 資產配置比例
                                        </h3>
                                        <div className="h-64">
                                            {pieData.length > 0 ? (
                                                <ResponsiveContainer width="100%" height="100%">
                                                    <PieChart>
                                                        <Pie data={pieData} innerRadius={60} outerRadius={80} paddingAngle={5} dataKey="value">
                                                            {pieData.map((entry, index) => <Cell key={index} fill={entry.color} />)}
                                                        </Pie>
                                                        <Tooltip formatter={(value) => `$${value.toLocaleString()}`} />
                                                        <Legend iconType="circle" />
                                                    </PieChart>
                                                </ResponsiveContainer>
                                            ) : (
                                                <div className="h-full flex items-center justify-center text-slate-300 text-sm italic">尚無資料</div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'accounts' && (
                                <div className="space-y-4">
                                    {banks.length === 0 && (
                                        <div className="text-center py-20 bg-white rounded-3xl border border-dashed border-slate-300">
                                            <i data-lucide="landmark" className="w-12 h-12 mx-auto text-slate-200 mb-2"></i>
                                            <p className="text-slate-400 text-sm">請點擊上方 "+" 按鈕新增銀行</p>
                                        </div>
                                    )}
                                    {banks.map(bank => (
                                        <div key={bank.id} className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                                            <div className="p-4 bg-slate-50 border-b flex justify-between items-center">
                                                <div className="flex items-center gap-2">
                                                    <i data-lucide="landmark" className="w-4 h-4 text-slate-400"></i>
                                                    <span className="font-bold text-slate-700">{bank.name}</span>
                                                </div>
                                                <button onClick={() => deleteBank(bank.id)} className="text-slate-300 hover:text-red-500 p-1">
                                                    <i data-lucide="trash-2" className="w-4 h-4"></i>
                                                </button>
                                            </div>
                                            <div className="grid grid-cols-2 gap-px bg-slate-100">
                                                {ASSET_TYPES.map(type => (
                                                    <div key={type.id} className="bg-white p-4">
                                                        <div className="flex justify-between items-start mb-1">
                                                            <span className="text-[10px] font-bold px-2 py-0.5 rounded bg-slate-50" style={{color: type.color, border: `1px solid ${type.color}20`}}>{type.name}</span>
                                                            <button onClick={() => setEditingAsset({ bankId: bank.id, assetId: type.id, assetName: type.name })} className="text-indigo-600 text-[10px] font-bold bg-indigo-50 px-2 py-1 rounded">更新</button>
                                                        </div>
                                                        <div className="text-lg font-mono font-bold text-slate-800">${(bank.assets[type.id] || 0).toLocaleString()}</div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {activeTab === 'history' && (
                                <div className="bg-white rounded-3xl shadow-sm border border-slate-100 divide-y overflow-hidden">
                                    {history.length === 0 ? (
                                        <div className="p-10 text-center text-slate-300 text-sm italic">尚無交易明細</div>
                                    ) : (
                                        history.map(item => (
                                            <div key={item.id} className="p-4 flex justify-between items-center hover:bg-slate-50">
                                                <div>
                                                    <div className="font-bold text-sm text-slate-700">{item.bankName} - {item.assetName}</div>
                                                    <div className="text-[10px] text-slate-400">{new Date(item.timestamp).toLocaleString()} • {item.note}</div>
                                                </div>
                                                <div className={`font-mono font-bold text-right ${item.amount >= 0 ? 'text-emerald-500' : 'text-rose-500'}`}>
                                                    {item.amount >= 0 ? '+' : ''}{item.amount.toLocaleString()}
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            )}
                        </main>

                        <nav className="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t flex justify-around p-3 max-w-xl mx-auto shadow-2xl rounded-t-2xl">
                            <button onClick={() => setActiveTab('overview')} className={`flex flex-col items-center gap-1 transition ${activeTab === 'overview' ? 'text-indigo-600' : 'text-slate-300'}`}>
                                <i data-lucide="trending-up" className="w-6 h-6"></i>
                                <span className="text-[9px] font-bold">總覽</span>
                            </button>
                            <button onClick={() => setActiveTab('accounts')} className={`flex flex-col items-center gap-1 transition ${activeTab === 'accounts' ? 'text-indigo-600' : 'text-slate-300'}`}>
                                <i data-lucide="wallet" className="w-6 h-6"></i>
                                <span className="text-[9px] font-bold">帳戶</span>
                            </button>
                            <button onClick={() => setActiveTab('history')} className={`flex flex-col items-center gap-1 transition ${activeTab === 'history' ? 'text-indigo-600' : 'text-slate-300'}`}>
                                <i data-lucide="history" className="w-6 h-6"></i>
                                <span className="text-[9px] font-bold">明細</span>
                            </button>
                        </nav>

                        {showAddBank && (
                            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                                <div className="bg-white p-6 rounded-3xl w-full max-w-xs modal-enter shadow-2xl">
                                    <h3 className="font-bold mb-4 text-slate-800">新增銀行帳戶</h3>
                                    <input autoFocus className="w-full border p-3 rounded-2xl mb-4 focus:ring-2 focus:ring-indigo-500 outline-none border-slate-200" placeholder="銀行名稱" value={newBankName} onChange={e => setNewBankName(e.target.value)} />
                                    <div className="flex gap-2">
                                        <button onClick={() => setShowAddBank(false)} className="flex-1 py-3 text-slate-400 text-sm font-bold">取消</button>
                                        <button onClick={addBank} className="flex-1 py-3 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg shadow-indigo-100">建立</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {editingAsset && (
                            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                                <div className="bg-white p-6 rounded-3xl w-full max-w-xs modal-enter shadow-2xl">
                                    <div className="mb-4">
                                        <span className="text-[10px] font-bold text-indigo-500 uppercase tracking-wider">更新資產</span>
                                        <h3 className="font-bold text-slate-800">{editingAsset.assetName}</h3>
                                    </div>
                                    <div className="space-y-4">
                                        <div className="relative">
                                            <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 font-mono">$</span>
                                            <input autoFocus type="number" className="w-full border p-4 pl-8 rounded-2xl text-2xl font-mono focus:ring-2 focus:ring-indigo-500 outline-none border-slate-200" placeholder="0.00" value={transactionAmount} onChange={e => setTransactionAmount(e.target.value)} />
                                        </div>
                                        <input className="w-full border p-3 rounded-2xl text-sm border-slate-100" placeholder="備註 (選填)" value={transactionNote} onChange={e => setTransactionNote(e.target.value)} />
                                        <div className="grid grid-cols-2 gap-3">
                                            <button onClick={() => handleTransaction('minus')} className="py-4 bg-rose-500 text-white rounded-2xl font-bold flex flex-col items-center shadow-lg shadow-rose-100 active:scale-95 transition">
                                                <i data-lucide="arrow-down-right" className="w-5 h-5 mb-1"></i>減少
                                            </button>
                                            <button onClick={() => handleTransaction('plus')} className="py-4 bg-emerald-500 text-white rounded-2xl font-bold flex flex-col items-center shadow-lg shadow-emerald-100 active:scale-95 transition">
                                                <i data-lucide="arrow-up-right" className="w-5 h-5 mb-1"></i>增加
                                            </button>
                                        </div>
                                        <button onClick={() => setEditingAsset(null)} className="w-full py-2 text-slate-300 text-xs font-bold">放棄更改並關閉</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            ReactDOM.render(<App />, document.getElementById('root'));
        };

        // 確保加載順序
        if (document.readyState === 'complete') {
            startApp();
        } else {
            window.addEventListener('load', startApp);
        }
    </script>
</body>
</html>
